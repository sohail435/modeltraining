name: MLOps Quality Assurance Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11 Runtime
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Application Integrity Check
      run: |
        # Checks if app.py can parse and load imports without compilation or syntax errors
        python -m py_compile app.py

docker-build-verification:
    runs-on: ubuntu-latest
    needs: code-quality-and-test

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Verify Dockerfile Build Compilation
      run: |
        # Natively compiles the Docker image to verify the instructions are structurally sound
        docker build -t saas-churn-app:test .