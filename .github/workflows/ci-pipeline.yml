name: MLOps Quality Assurance & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11 Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Application Integrity Check
      run: |
        python -m py_compile app.py

  docker-build-verification:
    runs-on: ubuntu-latest
    needs: code-quality-and-test

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Verify Dockerfile Build Compilation
      run: |
        docker build -t saas-churn-app:test .

  # =========================================================================
  # NEW: Continuous Deployment (CD) Job
  # =========================================================================
  deploy-to-production:
    runs-on: ubuntu-latest
    needs: docker-build-verification
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code Repository with Git LFS
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Configure Git Credentials and Force Push
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions Pipeline"
        
        # Use git credential helper to securely inject the token on runtime
        git config --global credential.helper store
        echo "https://sohail435:${{ secrets.HF_TOKEN }}@huggingface.co" > ~/.git-credentials
        
        # Safely execute the push to your remote space
        git push --force https://huggingface.co/spaces/sohail435/saas-churn-retention-engine main