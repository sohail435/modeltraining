name: MLOps Quality Assurance & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11 Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Application Integrity Check
      run: |
        python -m py_compile app.py

  docker-build-verification:
    runs-on: ubuntu-latest
    needs: code-quality-and-test

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Verify Dockerfile Build Compilation
      run: |
        docker build -t saas-churn-app:test .

  # =========================================================================
  # NEW: Continuous Deployment (CD) Job
  # =========================================================================
  deploy-to-production:
    runs-on: ubuntu-latest
    needs: docker-build-verification
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code Repository with Git LFS
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Install and Pull Git LFS Objects
      run: |
        git lfs install
        git lfs pull

    - name: Native Git Push Sync to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Set up authenticated remote URL using your repository secret
        git remote add hf https://sohail435:$HF_TOKEN@huggingface.co/spaces/sohail435/saas-churn-retention-engine
        
        # Configure throwaway CI user identity for the runner environment
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Force push the clean, LFS-tracked repository structure live
        git push hf main --force