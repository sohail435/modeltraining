name: MLOps Quality Assurance & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11 Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Application Integrity Check
      run: |
        python -m py_compile app.py

  docker-build-verification:
    runs-on: ubuntu-latest
    needs: code-quality-and-test

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Verify Dockerfile Build Compilation
      run: |
        docker build -t saas-churn-app:test .

  # =========================================================================
  # NEW: Continuous Deployment (CD) Job
  # =========================================================================
  deploy-to-production:
    runs-on: ubuntu-latest
    needs: docker-build-verification
    # Only deploy on direct pushes to main (skips deployment for PR test runs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code Repository with Git LFS
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true # Ensures your .joblib models are downloaded correctly

    - name: Push Container Infrastructure to Hugging Face Hub
      uses: huggingface/hub-sync@v0.1.0
      with:
        github_repo_id: ${{ github.repository }}
        huggingface_repo_id: sohail435/saas-churn-retention-engine
        hf_token: ${{ secrets.HF_TOKEN }}
        repo_type: space
        space_sdk: docker